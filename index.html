<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>STREETS | Intel in Motion</title>

  <link rel="stylesheet" href="styles.css?v=7" />

  <script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
  <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet" />
</head>

<body>
  <section id="loginScreen" class="login-screen">
    <div class="login-card">
      <img src="logo.png" class="login-logo" alt="STREETS Logo" />
      <h1>STREETS</h1>
      <p>Intel in Motion</p>

      <label>Officer Name</label>
      <input id="officerName" type="text" placeholder="Officer name" />

      <label>Badge / ID</label>
      <input id="officerBadge" type="text" placeholder="Badge / ID" />

      <label>Assigned Zone</label>
      <select id="officerZone"></select>

      <label>Role</label>
      <select id="officerRole">
        <option value="Patrol Officer">Patrol Officer</option>
        <option value="Sergeant">Sergeant</option>
        <option value="OIC">OIC</option>
        <option value="Command Staff">Command Staff</option>
      </select>

      <button id="loginBtn" class="primary-btn" onclick="login()">Enter App</button>
    </div>
  </section>

  <section id="appScreen" class="app-screen hidden">
    <header class="app-header">
      <div class="brand">
        <img src="logo-icon.png" class="brand-icon" alt="STREETS" />
        <div>
          <div class="brand-title">STREETS</div>
          <div class="brand-subtitle">Intel in Motion</div>
        </div>
      </div>

      <div class="officer-strip">
        <div id="officerDisplay">Officer</div>
        <div><span class="status-dot green"></span>Active</div>
      </div>
    </header>

    <section class="map-card">
      <div id="map"></div>
      <div class="map-legend">
        <span><i class="legend-dot blue"></i>Intel</span>
        <span><i class="legend-dot red"></i>Unassigned</span>
        <span><i class="legend-dot yellow"></i>Enroute</span>
        <span><i class="legend-dot green"></i>Covered</span>
      </div>
    </section>

    <section id="notificationBar" class="notification-bar">
      No active notifications.
    </section>

    <main id="dashboardView" class="view active">
      <section class="quick-stats">
        <div class="stat-card">
          <span>Intel</span>
          <strong id="statIntel">0</strong>
        </div>
        <div class="stat-card">
          <span>Perimeters</span>
          <strong id="statPerimeters">0</strong>
        </div>
        <div class="stat-card">
          <span>Units</span>
          <strong id="statOfficers">0</strong>
        </div>
      </section>

      <section class="panel">
        <div class="section-title">Recent Activity</div>
        <div id="homeFeed" class="feed-list"></div>
      </section>
    </main>

    <main id="feedView" class="view">
      <section class="panel">
        <div class="section-title">Zone Intel Toggle</div>
        <div id="zoneToggles" class="zone-grid"></div>
      </section>

      <section class="panel">
        <div class="section-title">Intel Feed</div>
        <div id="intelFeed" class="feed-list"></div>
      </section>
    </main>

    <main id="addView" class="view">
      <section class="panel">
        <div class="section-title">Add Intel</div>

        <div class="type-grid">
          <button class="intel-type active" data-type="Vehicle">Vehicle</button>
          <button class="intel-type" data-type="Person">Person</button>
          <button class="intel-type" data-type="Address">Address</button>
          <button class="intel-type" data-type="Follow-Up">Follow-Up</button>
        </div>

        <label>Zone</label>
        <select id="intelZone"></select>

        <label>Location / Intersection</label>
        <input id="intelLocation" type="text" placeholder="Miramar Pkwy & SW 64 Ave" />

        <label>Subject / Vehicle Info</label>
        <input id="intelSubject" type="text" placeholder="Plate, vehicle, person, descriptor" />

        <label>Notes</label>
        <textarea id="intelNotes" rows="4" placeholder="Brief notes"></textarea>

        <label>Expiration Date</label>
        <input id="intelExpiry" type="date" />

        <div class="action-row">
          <button id="savePersonalIntelBtn">Save Personal</button>
          <button id="shareZoneIntelBtn" class="primary-btn">Share to Zone</button>
        </div>
      </section>
    </main>

    <main id="messagesView" class="view">
      <section class="panel">
        <div class="section-title">Messages</div>

        <label>To</label>
        <input id="messageTo" type="text" placeholder="Officer, unit, or group" />

        <label>Message</label>
        <textarea id="messageBody" rows="4" placeholder="Type message"></textarea>

        <div class="action-row">
          <button id="sendMessageBtn" class="primary-btn">Send</button>
          <button id="recordVoiceBtn">Voice Note</button>
        </div>

        <audio id="voicePlayback" controls class="hidden"></audio>
      </section>

      <section class="panel">
        <div class="section-title">Message Feed</div>
        <div id="messageFeed" class="feed-list"></div>
      </section>
    </main>

    <main id="moreView" class="view">
      <section class="panel">
        <div class="section-title">Active Officers</div>
        <div id="officerFeed" class="feed-list"></div>
      </section>

      <section class="panel">
        <div class="section-title">Settings</div>
        <button id="logoutBtn" class="danger-btn">Logout</button>
      </section>
    </main>

    <main id="perimeterView" class="view">
      <section class="panel">
        <div class="section-title">Create Perimeter</div>

        <label>Incident Area</label>
        <input id="perimeterLocation" type="text" placeholder="Miramar Pkwy & University Dr" />

        <label>Zone</label>
        <select id="perimeterZone"></select>

        <label>Time Delay</label>
        <select id="perimeterDelay">
          <option value="2">2 minutes</option>
          <option value="5" selected>5 minutes</option>
          <option value="10">10 minutes</option>
          <option value="15">15 minutes</option>
          <option value="20">20 minutes</option>
        </select>

        <label>Direction of Travel</label>
        <select id="perimeterDirection">
          <option value="Unknown">Unknown</option>
          <option value="N">North</option>
          <option value="E">East</option>
          <option value="S">South</option>
          <option value="W">West</option>
          <option value="NE">North-East</option>
          <option value="SE">South-East</option>
          <option value="SW">South-West</option>
          <option value="NW">North-West</option>
        </select>

        <label>Method of Travel</label>
        <select id="perimeterMethod">
          <option value="Foot">Foot</option>
          <option value="Bicycle">Bicycle</option>
          <option value="Vehicle">Vehicle</option>
        </select>

        <button id="generatePerimeterBtn" class="primary-btn full-btn">Generate New Perimeter</button>
      </section>

      <section class="panel">
        <div class="section-title">Active Perimeters</div>
        <div id="activePerimeters" class="feed-list"></div>
      </section>
    </main>

    <nav class="bottom-nav">
      <button class="nav-tab active" data-view="dashboardView">⌂<span>Dash</span></button>
      <button class="nav-tab" data-view="feedView">☷<span>Feed</span></button>
      <button class="nav-add" data-view="addView">＋</button>
      <button class="nav-tab" data-view="messagesView">✉<span>Msg</span></button>
      <button class="nav-tab" data-view="moreView">•••<span>More</span></button>
    </nav>

    <button class="floating-perimeter" data-view="perimeterView">◇</button>
  </section>

  <script src="app.js?v=7"></script>
</body>
</html>
